<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chat_app</title>
  <!-- No build step: Tailwind (utilities) + DaisyUI (components) via CDN. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
    rel="stylesheet"
    type="text/css"
  />
</head>
<body class="bg-base-200">
  <!-- ===================== LOGIN ===================== -->
  <section id="login-view" class="hero min-h-screen">
    <div class="hero-content">
      <div class="card w-96 bg-base-100 shadow-xl">
        <div class="card-body">
          <h1 class="card-title text-2xl">chat_app</h1>
          <p class="text-sm opacity-70">Pick a display name to join.</p>
          <form id="login-form" class="mt-2 flex flex-col gap-3">
            <input
              id="login-name"
              type="text"
              placeholder="Your name"
              class="input input-bordered w-full"
              autocomplete="off"
              required
            />
            <button type="submit" class="btn btn-primary w-full">Join</button>
          </form>
          <div id="login-error" class="alert alert-error mt-2 hidden">
            <span></span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===================== APP ===================== -->
  <section id="app-view" class="hidden h-screen flex flex-col">
    <!-- Top navbar -->
    <div class="navbar bg-base-100 border-b border-base-300 min-h-0 py-2">
      <div class="flex-1 px-2 font-semibold">chat_app</div>
      <div class="flex-none gap-2 items-center">
        <span class="text-sm opacity-70">Signed in as</span>
        <span id="current-user" class="badge badge-primary"></span>
        <button id="logout-btn" class="btn btn-ghost btn-sm">Log out</button>
      </div>
    </div>

    <div class="flex flex-1 min-h-0">
      <!-- Sidebar -->
      <aside class="w-72 bg-base-100 border-r border-base-300 flex flex-col min-h-0">
        <div class="p-3">
          <form id="room-form" class="join w-full">
            <input
              id="room-name"
              type="text"
              placeholder="New room name"
              class="input input-bordered input-sm join-item w-full"
              autocomplete="off"
              required
            />
            <button type="submit" class="btn btn-primary btn-sm join-item">Add</button>
          </form>
        </div>
        <div class="px-3 text-xs uppercase opacity-50 tracking-wide">Rooms</div>
        <ul id="room-list" class="menu menu-sm flex-1 overflow-y-auto flex-nowrap"></ul>

        <div class="border-t border-base-300 p-3">
          <div class="text-xs uppercase opacity-50 tracking-wide mb-2">
            Online <span id="presence-count" class="badge badge-ghost badge-xs"></span>
          </div>
          <ul id="presence-list" class="space-y-1 text-sm"></ul>
        </div>
      </aside>

      <!-- Chat column -->
      <main class="flex-1 flex flex-col min-h-0 bg-base-200">
        <!-- Empty state -->
        <div id="no-room" class="flex-1 flex items-center justify-center opacity-50">
          Select or create a room to start chatting.
        </div>

        <!-- Active room -->
        <div id="room-view" class="hidden flex-1 flex flex-col min-h-0">
          <div class="navbar bg-base-100 border-b border-base-300 min-h-0 py-2 px-4">
            <span class="font-semibold"># <span id="room-title"></span></span>
          </div>

          <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-1"></div>

          <form id="message-form" class="p-3 bg-base-100 border-t border-base-300 flex gap-2">
            <input
              id="message-input"
              type="text"
              placeholder="Message…"
              class="input input-bordered flex-1"
              autocomplete="off"
            />
            <button type="submit" class="btn btn-primary">Send</button>
          </form>
        </div>
      </main>
    </div>
  </section>

  <script>
    // ------------------------------------------------------------------
    // State
    // ------------------------------------------------------------------
    const state = {
      user: null,            // { id, name }
      rooms: [],             // [{ id, name }]
      currentRoomId: null,
      socket: null,
      userNames: {},         // { userId: name } — learned from presence + self
      presence: {},          // { userId: { name } } for the current room
    };

    // ------------------------------------------------------------------
    // Helpers
    // ------------------------------------------------------------------
    const $ = (sel) => document.querySelector(sel);

    async function api(method, path, body) {
      const opts = { method, headers: {} };
      if (body !== undefined) {
        opts.headers["Content-Type"] = "application/json";
        opts.body = JSON.stringify(body);
      }
      const res = await fetch(path, opts); // same-origin → session cookie sent automatically
      if (!res.ok) {
        const detail = await res.json().catch(() => ({}));
        throw new Error(detail.detail || `${res.status} ${res.statusText}`);
      }
      return res.status === 204 ? null : res.json();
    }

    function nameFor(userId) {
      return state.userNames[userId] || `User ${userId}`;
    }

    function fmtTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function scrollMessagesToBottom() {
      const el = $("#messages");
      el.scrollTop = el.scrollHeight;
    }

    // ------------------------------------------------------------------
    // Rendering
    // ------------------------------------------------------------------
    function renderRooms() {
      const list = $("#room-list");
      list.innerHTML = "";
      for (const room of state.rooms) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = "# " + room.name;
        if (room.id === state.currentRoomId) a.classList.add("active");
        a.onclick = () => selectRoom(room.id);
        li.appendChild(a);
        list.appendChild(li);
      }
    }

    function renderPresence() {
      const ids = Object.keys(state.presence);
      $("#presence-count").textContent = ids.length;
      const list = $("#presence-list");
      list.innerHTML = "";
      for (const id of ids) {
        const li = document.createElement("li");
        li.className = "flex items-center gap-2";
        li.innerHTML =
          '<span class="inline-block w-2 h-2 rounded-full bg-success"></span>' +
          `<span>${escapeHtml(state.presence[id].name)}</span>`;
        list.appendChild(li);
      }
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    function appendMessage(msg) {
      const mine = msg.user_id === state.user.id;
      const wrap = document.createElement("div");
      wrap.className = "chat " + (mine ? "chat-end" : "chat-start");
      wrap.innerHTML =
        '<div class="chat-header opacity-70 text-xs">' +
        escapeHtml(nameFor(msg.user_id)) +
        ' <time class="opacity-50">' + fmtTime(msg.created_at) + "</time></div>" +
        '<div class="chat-bubble ' + (mine ? "chat-bubble-primary" : "") + '">' +
        escapeHtml(msg.body) +
        "</div>";
      $("#messages").appendChild(wrap);
    }

    // ------------------------------------------------------------------
    // Rooms + messages
    // ------------------------------------------------------------------
    async function loadRooms() {
      state.rooms = await api("GET", "/api/rooms");
      renderRooms();
    }

    async function selectRoom(roomId) {
      if (state.currentRoomId === roomId) return;
      state.currentRoomId = roomId;
      const room = state.rooms.find((r) => r.id === roomId);

      $("#no-room").classList.add("hidden");
      $("#room-view").classList.remove("hidden");
      $("#room-title").textContent = room ? room.name : roomId;
      $("#messages").innerHTML = "";
      state.presence = {};
      renderPresence();
      renderRooms();

      // 1. History over REST
      const history = await api("GET", `/api/rooms/${roomId}/messages?limit=50`);
      for (const m of history) appendMessage(m);
      scrollMessagesToBottom();

      // 2. Live over WebSocket
      openSocket(roomId);
    }

    // ------------------------------------------------------------------
    // WebSocket
    // ------------------------------------------------------------------
    function openSocket(roomId) {
      if (state.socket) {
        state.socket.onclose = null; // avoid reconnect side-effects on manual switch
        state.socket.close();
      }
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      const ws = new WebSocket(`${proto}//${location.host}/ws/rooms/${roomId}`);
      state.socket = ws;

      ws.onmessage = (event) => {
        const { event: type, payload } = JSON.parse(event.data);
        if (type === "presence_state") {
          state.presence = payload;
          for (const [id, info] of Object.entries(payload)) state.userNames[id] = info.name;
          renderPresence();
        } else if (type === "presence_diff") {
          for (const [id, info] of Object.entries(payload.joins || {})) {
            state.presence[id] = info;
            state.userNames[id] = info.name;
          }
          for (const id of Object.keys(payload.leaves || {})) delete state.presence[id];
          renderPresence();
        } else if (type === "new_message") {
          appendMessage(payload);
          scrollMessagesToBottom();
        }
      };

      ws.onclose = (e) => {
        if (e.code === 4401) alert("Session expired — please log in again.");
      };
    }

    // ------------------------------------------------------------------
    // Auth / view switching
    // ------------------------------------------------------------------
    function showApp() {
      $("#login-view").classList.add("hidden");
      $("#app-view").classList.remove("hidden");
      $("#current-user").textContent = state.user.name;
    }

    // ------------------------------------------------------------------
    // Event wiring
    // ------------------------------------------------------------------
    $("#login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = $("#login-name").value.trim();
      if (!name) return;
      const errEl = $("#login-error");
      errEl.classList.add("hidden");
      try {
        state.user = await api("POST", "/api/session", { name });
        state.userNames[state.user.id] = state.user.name;
        showApp();
        await loadRooms();
      } catch (err) {
        errEl.querySelector("span").textContent = err.message;
        errEl.classList.remove("hidden");
      }
    });

    $("#room-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = $("#room-name").value.trim();
      if (!name) return;
      const room = await api("POST", "/api/rooms", { name });
      $("#room-name").value = "";
      await loadRooms();
      selectRoom(room.id);
    });

    $("#message-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const input = $("#message-input");
      const body = input.value.trim();
      if (!body || !state.socket || state.socket.readyState !== WebSocket.OPEN) return;
      state.socket.send(JSON.stringify({ body })); // server reads data["body"]
      input.value = "";
    });

    $("#logout-btn").addEventListener("click", async () => {
      if (state.socket) state.socket.close();
      await api("DELETE", "/api/session").catch(() => {});
      location.reload();
    });
  </script>
</body>
</html>
